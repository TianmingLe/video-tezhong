appId: pro.omniscraper.desktop
productName: OmniScraper Desktop
asar: true
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
directories:
  buildResources: resources
  output: release
files:
  - dist/**
  - resources/**
  - package.json
  - node_modules/**
  - '!**/*.map'
  - '!**/*.ts'
  - '!**/*.tsx'
  - '!**/*.test.*'
  - '!**/__tests__/**'
  - '!electron/**'
  - '!scripts/**'
mac:
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
