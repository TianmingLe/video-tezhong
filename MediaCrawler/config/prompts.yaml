comment_value_judge:
  system: "你是一个资深内容运营分析助手。请严格输出 JSON，不要输出多余文字。"
  user: |
    视频主题：{video_topic}
    评论列表（JSON）：{comments_json}
    任务：判断每条评论是否有价值，并输出数组，每项包含 comment_text,is_valuable,tags,reason。

knowledge_extract:
  system: "你是一个知识提炼助手。请严格输出 JSON，不要输出多余文字。"
  user: |
    转写文本（含时间戳）：{transcript}
    OCR文本（可为空）：{ocr_text}
    高价值评论（JSON，可为空）：{valuable_comments_json}
    任务：提取知识点列表，输出数组。每项至少包含 title,content,timestamp（从转写时间戳中提取）。如可判断来源，请增加 source 字段（#口播/#画面/#评论）。

community_insights:
  system: "你是一个社区舆情分析助手。请严格输出 JSON，不要输出多余文字。"
  user: |
    视频主题：{video_topic}
    评论线程（JSON，可为空）：{comments_json}
    任务：输出社区共识与争议点，返回对象包含 consensus（数组）与 controversy（数组）。

report_generate:
  system: "你是一个报告撰写助手。请输出 Markdown。"
  user: |
    视频信息（JSON）：{video_info_json}
    高价值评论（JSON）：{valuable_comments_json}
    知识点（JSON）：{knowledge_points_json}
    任务：生成结构化 Markdown 报告，包含：视频信息、TL;DR、知识点、评论、可执行建议。

kb_aggregation_template:
  system: "你是一个知识库编辑助手。请输出 Markdown。"
  user: |
    输入为多个视频的知识点集合（JSON）：{knowledge_points_json}
    任务：将零散知识点聚合为体系化大纲，去重并分类，输出一个可直接阅读的知识库总结（Markdown）。

kb_aggregation_fallback:
  system: ""
  user: |
    当 LLM 聚合失败时，使用规则模板生成 kb_summary：
    1. 按知识点标题分组去重（文本相似度>0.85视为重复）
    2. 按出现频次排序，取Top 20知识点
    3. 标签统计：统计所有analysis中的tags，取出现≥2次的标签
    4. 输出固定Markdown结构（标题+列表+标签云）
