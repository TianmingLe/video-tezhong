name: Nightly

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies (desktop)
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Validate YAML
        working-directory: desktop
        run: npm run validate:yaml

      - name: Test (desktop)
        working-directory: desktop
        run: npm test

      - name: Typecheck (desktop)
        working-directory: desktop
        run: npm run typecheck

      - name: Build distributables (unsigned)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - name: Append short sha to installers (linux/macos)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: desktop
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          cd release
          for f in *.dmg *.AppImage; do
            if [ -f "$f" ]; then
              base="${f%.*}"
              ext="${f##*.}"
              mv "$f" "${base}-${SHORT_SHA}.${ext}"
            fi
          done

      - name: Append short sha to installers (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: desktop
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0,7)
          Get-ChildItem -Path release -Filter *.exe | ForEach-Object {
            $newName = "$($_.BaseName)-$shortSha$($_.Extension)"
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}
          path: desktop/release/**
          if-no-files-found: error

  release:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update nightly tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$GITHUB_SHA"
          git push -f origin nightly

      - name: Ensure nightly release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly --prerelease --title nightly --notes "Nightly build for ${GITHUB_SHA}"
          else
            gh release create nightly --prerelease --title nightly --notes "Nightly build for ${GITHUB_SHA}"
          fi

      - name: Upload new assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name 'latest*.yml' -o \
            -name '*.blockmap' \
          \) -print0 | xargs -0 gh release upload nightly --clobber
